name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
      - main

# Opt-in to Node 24 early to clear deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: snake-generator
  cancel-in-progress: true

jobs:
  generate-snake:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate SVG Animation
        # Using the latest version of Platane/snk
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Sufi065
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2300d1ff&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353

      - name: Deploy to Output Branch
        # Upgraded to v4 to support Node 24 environments
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update contribution snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
